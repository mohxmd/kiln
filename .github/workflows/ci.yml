name: ci

on:
  pull_request:
    paths:
      - "src/**"
      - ".github/workflows/ci.yml"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/ci.yml"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run check-types

      - name: Build
        run: bun run build
